title: Résumé — Full-Stack Developer
slug: role-fullstack

summary: >-
  Senior Software Engineer with 10+ years of experience building full-stack web applications from requirements through production, for engineering, environmental, and government clients. Deep experience across React frontends, Node.js and Python backends, PostgreSQL databases, and cloud-hosted deployments on AWS and Azure. Spent a decade at a civil engineering firm owning the full lifecycle of internal and client-facing tools — from stakeholder interviews through design, implementation, and ongoing maintenance. Background in UX and data journalism means I care about what the application actually communicates, not just whether it runs.

