title: Résumé — Geospatial Developer
slug: role-geospatial

summary: >-
  Senior Software Engineer and geospatial specialist with 10+ years of experience building spatial data systems, GIS-integrated applications, and field data collection tools for environmental and engineering clients. Deep experience across the full geospatial stack — PostGIS, ArcGIS Enterprise, cloud-native GIS workflows, and geospatial ETL pipelines — developed working with scientists, engineers, and field staff on projects spanning FERC dam safety compliance, EPA Superfund sites, and wetland delineation. Equally comfortable at the database, the API layer, and the map interface. Background in data journalism adds an unusual lens: geospatial data is only useful if it communicates clearly.

