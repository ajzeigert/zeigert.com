title: Résumé — Sr. Software Engineer, BNSF
slug: bnsf-frontend-engineer
jobUrl: 'https://careers.bnsf.com/'

summary: >-
  Senior Software Engineer with 10+ years of experience building production-quality frontend and full-stack web applications — from stakeholder requirements through design, implementation, and deployment. Deep React and React Native experience including a shipped cross-platform field data collection app distributed to iOS and Android. Strong TypeScript foundation, UX design background, and a track record of enabling teams with limited UI experience to deliver polished, user-centered workflows. Built an internal generative AI assistant on Azure and actively integrate AI tooling into daily development. Comfortable owning technical design decisions that directly shape user outcomes.

