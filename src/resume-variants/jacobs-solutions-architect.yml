summary: >-
  Solutions architect and senior geospatial engineer with 15+ years of experience
  spanning data journalism, UX design, and full-stack GIS development — delivering
  digital solutions for environmental and engineering consulting clients. Deep
  expertise across the Esri platform including ArcGIS Enterprise, Server, Portal,
  Survey123, and Collector, paired with strong cloud infrastructure and data pipeline
  skills. Proven track record in client-facing consulting environments, bridging
  technical delivery and stakeholder communication on projects for federal, state,
  and tribal clients.

