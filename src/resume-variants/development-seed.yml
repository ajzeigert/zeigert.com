    - Collaborated directly with stakeholders to translate complex scientific and engineering requirements into clear, usable software interfaces
    - Implemented user testing frameworks that improved product quality and client satisfaction across a broad portfolio of applications
  "Graphics Reporter":
    - Produced maps, data visualizations, and interactive geospatial tools for a regional newspaper, making complex environmental and scientific stories accessible
  "Project Facilitator":
    - Led implementation of a new publishing system across multiple publications, managing scope, timelines, and cross-team coordination
    - Trained staff on the new system, ensuring smooth adoption and minimal disruption to production workflows
