summary: >-
  Technical project leader and Senior Software Engineer with 10+ years of experience building geospatial web applications and cloud infrastructure for environmental and scientific clients. Proven track record of bridging engineering teams and non-technical stakeholders, managing cross-functional projects, and delivering tools that support data-driven science. Deep background in GIS, cloud-native geospatial workflows, and open-source development. Passionate about open science, Earth observation, and building technology that magnifies the impact of publicly funded research.

