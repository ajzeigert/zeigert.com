highlights:
  "Senior Software Engineer":
    - Led cross-functional engineering projects for environmental and geoscience clients, coordinating scope, timelines, and delivery across distributed teams
    - Built automated CI/CD pipelines and testing infrastructure, accelerating release cycles and ensuring reliable deployments
    - Mentored junior engineers through a university partnership, investing in team growth and technical development
    - Implemented security best practices across application stacks, contributed toward company goal of CMMC Level 2 certification
  "Software Engineer":
    - Built and shipped geospatial web applications used by scientists and engineers, improving data collection and environmental project management workflows
    - Managed development and production environments for multiple Node.js applications on AWS and Azure, ensuring reliable uptime across projects
