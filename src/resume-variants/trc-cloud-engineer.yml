title: Résumé — Senior Cloud Software Engineer
slug: trc-cloud-engineer
jobUrl: 'https://careers.trccompanies.com/careers-home/jobs/25290?lang=en-us'

summary: >-
  Senior Software Engineer with 10+ years of experience building cloud-hosted geospatial applications and data pipelines for environmental and engineering clients. Deep AWS and Azure experience across serverless (Lambda, Azure Functions), containerized (ECS), and managed (Elastic Beanstalk) platforms. Brings strong geospatial domain knowledge — ArcGIS Enterprise integration, spatial data pipelines, PostGIS — alongside a track record of hardening cloud security and automating deployments.

