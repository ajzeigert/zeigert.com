highlights:
  "Senior Software Engineer":
    - Promoted to Senior Software Engineer after three years, reflecting expanded ownership of cloud infrastructure, deployment systems, and team mentorship
    - Restructured AWS environment into a managed Organization with individual IAM users, MFA enforcement, and role-based cross-account access, eliminating shared master credentials across all accounts
    - Migrated four production applications from hardcoded credentials to AWS Secrets Manager and environment variables, remediating secrets exposure and strengthening compliance posture toward CMMC Level 2 certification
    - Administered Azure AD (Entra ID) and designed an enterprise SSO authentication pattern embedded in application templates, ensuring consistent identity management and conditional access across all new deployments
    - Implemented GitHub Actions CI/CD pipelines for five Elastic Beanstalk applications and AWS CodeBuild pipelines for ECS container workloads, automating deployments and enforcing PR-based release discipline
    - Built infrastructure-as-code provisioning workflows using AWS CloudFormation and CLI tooling for VPC, RDS, and Elastic Beanstalk environments, enabling reproducible environment setup and reducing manual provisioning errors
    - Led Azure AI Foundry deployment, designing secure data access architecture and LLM integration for a safety report assistant with accuracy and PII protection requirements
    - Built and deployed serverless event-driven services using AWS Lambda and Azure Functions, reducing compute costs and increasing flexibility across multiple application workloads
    - Designed a React/Node/PostgreSQL application template with CLI-driven Elastic Beanstalk deployment and Azure AD SSO built in, reducing new project setup from weeks to hours; five production applications currently run on it
    - Managed production AWS and Azure environments for multiple Node.js applications across Elastic Beanstalk, ECS, and RDS, maintaining uptime and deployment reliability
    - Audited AWS accounts and right-sized oversized compute instances, reducing monthly cloud spend by approximately 20% through instance optimization and savings plan adoption
    - Improved cloud security posture by establishing IAM policies, access controls, and account separation across multiple AWS environments
    - Built and managed containerized application workloads on ECS using Docker-based deployment patterns in production environments
    - Mentored four university partnership teams — approximately twelve students total — through full application lifecycles including production deployment to AWS and Azure environments
