title: Résumé — Cloud Infrastructure Engineer
slug: role-cloud-infrastructure

summary: >-
  Senior Software Engineer with 10+ years of experience building and operating cloud infrastructure for production applications on AWS and Azure. Strong track record in CI/CD automation, security hardening, cost optimization, and infrastructure-as-code — developed while serving as the primary cloud and DevOps engineer across a portfolio of applications at a civil engineering firm. Comfortable writing application code in the morning and wiring up pipelines in the afternoon. I like building clean, repeatable, well-documented infrastructure that teams can actually own and operate.

