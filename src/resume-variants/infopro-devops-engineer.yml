    - Audited cloud accounts and right-sized oversized compute instances, reducing monthly cloud spend by approximately 20% through instance optimization and savings plan adoption
    - Improved security posture across cloud accounts, including access control reviews and elimination of over-permissioned roles
    - Built and managed containerized application workloads on ECS, gaining hands-on experience with Docker-based deployment patterns in production environments
