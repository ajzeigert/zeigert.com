highlights:
  "Senior Software Engineer":
    - Built and maintained geospatial data pipelines that ingest, clean, conflate, and validate multi-source datasets, ensuring spatial data moves reliably from source systems into customer-facing products
    - Led complex geoprocessing and large-scale QA/QC — applying technical judgment to resolve ambiguous edge cases, identify data quality risks, and flag datasets for update, replacement, or retirement
    - Performed advanced geoprocessing, editing, and spatial analysis in QGIS, and extended workflows with Python (GDAL, geopandas, PyQGIS) and tuned SQL/PostGIS queries with spatial indexing for performant, scalable processing over large datasets
    - Use Claude Code and AI tooling daily as a repeatable co-pilot to generate, optimize, and automate geospatial workflows — feature extraction, classification, conflation, and QA — pairing human judgment with validation
    - Developed and shipped GeoGrab, a React Native field data collection app deployed to iOS and Android, capturing and validating geospatial observations from project sites
    - Worked autonomously on ill-defined, complex projects, bringing structure and execution rigor to ambiguous problem spaces while communicating technical decisions, risks, and progress clearly to non-technical partners
    - Drove consistency and repeatability across teams using Git and collaborative workflows, and mentored junior engineers and university partnership teams
  "Graphics Reporter":
    - Produced maps and geospatial visualizations for a regional newspaper, making complex land-use and terrain stories accessible to a broad audience — spatial data is only useful if it communicates clearly
