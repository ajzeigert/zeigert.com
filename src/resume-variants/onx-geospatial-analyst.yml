summary: >-
  Senior software and geospatial engineer with 10+ years building, validating, and shipping spatial datasets and geoprocessing pipelines for environmental and engineering clients. Advanced QGIS user with strong PostGIS, SQL, and Python (GDAL, geopandas, PyQGIS) skills, and deep experience in multi-source integration, conflation, and large-scale QA/QC of regulated spatial data moving reliably from source systems into customer-facing products. A daily user of Claude Code and AI tooling to generate, automate, and accelerate geospatial workflows. Bend, Oregon–based and an avid backcountry and offroad explorer — I build the kind of maps I actually use.

