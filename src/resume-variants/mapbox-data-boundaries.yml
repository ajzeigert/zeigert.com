highlights:
  "Software Engineer, Developer":
    - Implementing incremental vector tile updates for multiple geometry types in Mapbox vector tile format, improving coverage precision and update frequency for a client's geospatial data product
    - Building an open-source MapLibre plugin for the Lume static site ecosystem, enabling GeoJSON and SimpleStyle rendering with CDN-loaded MapLibre
  "Senior Software Engineer":
    - Built geospatial data collection and processing pipelines for field staff on environmental projects, spanning data ingestion, spatial ETL, and delivery to PostGIS and ArcGIS backends
    - Integrated geospatial feature services with REST APIs and PostGIS/PostgreSQL databases, including custom spatial queries and pl/pgsql functions for data transformation
    - Implemented event-driven microservice architecture using AWS Lambda to process and route geospatial data events, reducing compute costs and improving pipeline scalability
    - Mentored four university partnership teams through full application lifecycles on projects requiring data architecture and secure backend design
  "Graphics Reporter":
    - Produced maps and data visualizations for a regional newspaper — experience that directly informs how Boundaries data is used downstream by data journalists and BI teams
