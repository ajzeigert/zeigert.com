summary:
  - Versatile software engineer with 10+ years building spatial data pipelines and GIS applications for environmental and engineering clients. Deep experience with mapping toolchains, cloud optimization and mentoring other developers. Current work includes creating a pipeline for updating Mapbox vector tiles from PostGIS using incremental updates and building an open-source MapLibre plugin.

  - I've been using Mapbox tools and services for most of my career as a developer, and I think that my experience with AWS, data pipelines and open source geospatial tools make me an ideal candidate for the Boundaries team at Mapbox. Helping to expand this already-great service would be a career highlight for me.

