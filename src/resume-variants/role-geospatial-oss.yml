title: "Résumé — Geospatial Data Engineer (Open Source)"
slug: role-geospatial-oss

summary: >-
  Geospatial data engineer with 10+ years building spatial data pipelines and
  open-source GIS applications for environmental and engineering clients. PostGIS
  and vector tile formats have been my primary tools — developed across projects
  spanning data ingestion, spatial ETL, and map delivery. Currently working on
  incremental vector tile updates for area geometry types and building an open-source
  MapLibre plugin. Former data journalist: I understand both how geospatial data is
  built and how it's used to tell stories.

