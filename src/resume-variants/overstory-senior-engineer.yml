summary: >-
  Senior Software Engineer with 10+ years of experience building geospatial web applications and data pipelines for environmental and engineering clients. Deep background in spatial data systems — PostGIS, geospatial ETL/ELT pipelines, and GIS-integrated full-stack applications — developed working with scientists, engineers, and field staff on projects touching FERC dam safety, EPA Superfund sites, and wetland delineation workflows. Equally comfortable owning backend infrastructure and data architecture as I am building the React interfaces that surface that data. Drawn to Overstory because the mission sits at the intersection of geospatial technology and climate impact — two things I care deeply about.

