title: Résumé — GIS Coordinator
slug: govpilot-gis-coordinator
jobUrl: ''

summary: >-
  Senior Software Engineer and GIS specialist with 10+ years of experience building spatial data systems, geoprocessing pipelines, and field data collection tools for environmental and engineering clients working under regulatory frameworks. Deep hands-on experience across ArcGIS Pro and Enterprise, PostGIS, Python and SQL automation, and mobile GIS — developed on projects spanning FERC dam safety compliance, EPA Superfund sites, wetland delineation, and tribal government data workflows. These are structurally the same problems municipal GIS faces: regulated spatial datasets, permit and inspection records, field collection requirements, and non-technical end users who need tools that actually work. UX background means the spatial tools I build get adopted, not just deployed.

