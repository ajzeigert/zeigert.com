        - paragraph [ref=e35]: It felt like time to do some old-fashioned geoblogging.
        - paragraph [ref=e36]: I recently went for a hike at Mokst Butte near Newberry Volcano to gather some info for a mapping project I'm working on.
        - paragraph [ref=e37]: Mokst Butte is a cinder cone in the field north of Newberry, with an elevation of 1,880 meters (6,168 ft) and a relief (height above the surrounding area) of about 176 meters (577 ft).
        - paragraph [ref=e38]: "There is a large staging area to the east of the butte that can be accessed from Forest Road 9710, which follows the northern edge of the official volcanic monument boundary. The staging area is red cinder and largely free of trees. It appears to be used for some bonfires, but there are also a number of interesting petroforms: at least two medicine wheels and one labyrinth."
        - paragraph [ref=e39]:
          - text: There appears to be no established trail ascending the butte itself. It's either a scramble up razor-sharp boulders and scree on the south and west flanks or ankle-deep duff and dead fall on the east and north. Either way, straight up seems to be the best way. No signage in staging area to aid, no published trail map that the author could find. There is a Forest Service survey marker at the summit. Mokst Butte is a
          - link "designated Research Natural Area ↗" [ref=e40] [cursor=pointer]:
            - /url: https://research.fs.usda.gov/pnw/rnas/locations/mokst-butte
          - text: ", so human activity is discouraged. (Sorry.)"
        - paragraph [ref=e41]: The summit itself offers excellent views in almost every direction, from the Cascades to the east and a fine view of Newberry Crater to the south. The geology is mostly basaltic andesite with some vent and pyroclastic rocks as well.
        - paragraph [ref=e42]: If you want to bring a dog, I'd recommend booties. There's a lot of sharp rock scrambling.
        - paragraph [ref=e43]:
          - strong [ref=e44]: "Travel time from Bend:"
          - text: 40 minutes
        - paragraph [ref=e45]:
          - strong [ref=e46]: "Difficulty:"
          - text: 4/5
        - paragraph [ref=e47]:
          - strong [ref=e48]: "Best dates:"
          - text: Late April to early May, after the snow is gone but before it gets too hot
