            - list [ref=e108]:
              - listitem [ref=e109]:
                - paragraph [ref=e110]: We value high-performing creative individuals who dig into problems and opportunities.
              - listitem [ref=e111]:
                - paragraph [ref=e112]: We believe in individuals being their whole selves at work. We commit to this through supportive health care, parental leave, flexibility for the things that come up in life, and innovating on how we think about supporting our people.
              - listitem [ref=e113]:
                - paragraph [ref=e114]: We emphasize an environment of teaching and learning to equip employees with the tools needed to be successful in their function and the company.
              - listitem [ref=e115]:
                - paragraph [ref=e116]: We strongly believe in the value of growing a diverse team and encourage people of all backgrounds, genders, ethnicities, abilities, and sexual orientations to apply.
            - paragraph [ref=e117]: Our annual base compensation for this role ranges from $160,650 - $217,350 for most US locations and 5% to 10% higher for US locations with a higher cost of labor. Job level and actual compensation will be decided based on factors including, but not limited to, individual qualifications objectively assessed during the interview process (including skills and prior relevant experience, potential impact, and scope of role), market demands, and specific work location. Please discuss your specific work location with your recruiter for more information.
