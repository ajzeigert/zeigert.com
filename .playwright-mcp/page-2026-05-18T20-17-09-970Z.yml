        - tabpanel "Overview" [ref=e31]:
          - generic [ref=e32]:
            - paragraph [ref=e33]: Mapbox is the leading real-time location platform for a new generation of location-aware businesses. Mapbox is the only platform that equips organizations with the full set of tools to power the navigation of people, packages, and vehicles everywhere. More than 4 million registered developers have chosen Mapbox because of the platform’s flexibility, security and privacy compliance. Organizations use Mapbox applications, data, SDKs and APIs to create customized and immersive experiences that delight their customers.
            - heading "What We Do" [level=2] [ref=e34]:
              - strong [ref=e35]: What We Do
            - paragraph [ref=e36]: Mapbox Boundaries is an expertly curated set of global boundary data that allows you to add boundaries to your maps, dashboards, and data visualizations. Mapbox Boundaries consists of multiple data layers that come cartographically-matched, georeferenced, and processed as a Mapbox vector tileset ready for integration with your maps and data. From business intelligence analysis and data journalism to territory planning and logistics management, customers utilize boundary maps data in countless solutions.
            - paragraph [ref=e37]: "Here are some of our recent Boundaries blog posts:"
            - list [ref=e38]:
              - listitem [ref=e39]:
                - paragraph [ref=e40]:
                  - link "Advanced Geospatial Analysis with Mapbox Boundaries Flat File Format" [ref=e41] [cursor=pointer]:
                    - /url: https://www.mapbox.com/blog/boundaries-flat-file-format
              - listitem [ref=e42]:
                - paragraph [ref=e43]:
                  - link "Expanded Coverage with Mapbox Boundaries 4.3" [ref=e44] [cursor=pointer]:
                    - /url: https://www.mapbox.com/blog/granular-geospatial-boundary-data
              - listitem [ref=e45]:
                - paragraph [ref=e46]:
                  - link "Introducing the Mapbox Snowflake Native App" [ref=e47] [cursor=pointer]:
                    - /url: https://www.mapbox.com/blog/snowflake-native-app
              - listitem [ref=e48]:
                - paragraph [ref=e49]:
                  - link "How Topology Improves GIS Data Quality" [ref=e50] [cursor=pointer]:
                    - /url: https://www.mapbox.com/blog/topology-data-implications
              - listitem [ref=e51]:
                - paragraph [ref=e52]:
                  - link "Expanding the Boundaries of Visualization" [ref=e53] [cursor=pointer]:
                    - /url: https://www.mapbox.com/blog/expanding-the-boundaries-of-visualization
            - paragraph [ref=e54]: Our Boundaries team is a part of the Search Data organization that supplies address, boundaries, place, and points of interest (POI) data for global searches in countries around the world. Search is crucial for our customers’ applications and we are a key partner to the Maps and Navigation organizations at Mapbox. Whether you’re trying to find a place among the vast ocean of data on a global map or to find the exact location of a venue a few miles down the road, Search is in the critical path of our customers’ experiences.
            - paragraph [ref=e55]
            - heading "What You'll Do" [level=2] [ref=e56]:
              - strong [ref=e57]: What You'll Do
            - paragraph [ref=e58]: Our world is not static and, therefore, our data cannot be static. It needs to be constantly updated and available for Mapbox developers to utilize when they want to build a BI dashboard, create a navigation app, or customize the world for their audience. We want to expand our Boundaries data offerings to allow our users to consume more of our data to create their version of a living map and location service. This role will be focused on data engineering for feature expansion, improving coverage, increasing polygon precision, and building pipelines to ingest new data sources.
            - paragraph [ref=e59]: "As a Software Engineer on the Boundaries team, you will:"
            - list [ref=e60]:
              - listitem [ref=e61]:
                - paragraph [ref=e62]: Integrate third-party data sources from different geographic areas into our data pipelines
              - listitem [ref=e63]:
                - paragraph [ref=e64]: Inspect and edit geospatial data using open-source tools
              - listitem [ref=e65]:
                - paragraph [ref=e66]: Develop geographic data processing pipelines
              - listitem [ref=e67]:
                - paragraph [ref=e68]: Interface with engineers from other teams to understand their needs for geospatial data and provide solutions
              - listitem [ref=e69]:
                - paragraph [ref=e70]: Implement automated quality metrics to ensure we are continuously delivering high quality data to our customers
              - listitem [ref=e71]:
                - paragraph [ref=e72]: Mentor other software engineers to develop all aspects of their engineering skill sets, including participating in design and code reviews
                - paragraph [ref=e73]
            - heading "What We Believe are Important Traits for This Role" [level=2] [ref=e74]:
              - strong [ref=e75]: What We Believe are Important Traits for This Role
            - list [ref=e76]:
              - listitem [ref=e77]:
                - paragraph [ref=e78]: 5+ years of industry experience working with data pipelines
              - listitem [ref=e79]:
                - paragraph [ref=e80]: Proficiency in at least one modern programming language (like Python or Java) suitable for data processing
              - listitem [ref=e81]:
                - paragraph [ref=e82]: Expertise with GIS tools and processes, preferably open-source ones such as QGIS, Postgres/PostGIS, GDAL/OGR, GeoJSON
              - listitem [ref=e83]:
                - paragraph [ref=e84]: Experience with AWS technologies like S3 and Athena
              - listitem [ref=e85]:
                - paragraph [ref=e86]: Experience writing bash scripts and running command line tools
              - listitem [ref=e87]:
                - paragraph [ref=e88]: Working knowledge with SQL databases and ideally experience writing custom functions (e.g. with pl/pgsql)
              - listitem [ref=e89]:
                - paragraph [ref=e90]: Excellent debugging experience and performance profiling that includes running QA or test systems at scale
              - listitem [ref=e91]:
                - paragraph [ref=e92]: Strong experience with batch data processing and developed judgment to implement new data pipelines and best practices around it
              - listitem [ref=e93]:
                - paragraph [ref=e94]: Comfortable working with a git-based environment (such as GitHub)
              - listitem [ref=e95]:
                - paragraph [ref=e96]: Familiarity with Docker
              - listitem [ref=e97]:
                - paragraph [ref=e98]: Familiarity with CI/CD processes
              - listitem [ref=e99]:
                - paragraph [ref=e100]: Integrating data with APIs and querying data through APIs
              - listitem [ref=e101]:
                - paragraph [ref=e102]: Familiarity working with Iceberg, Glue and AWS Step Functions
                - paragraph [ref=e103]
            - heading "What We Value" [level=2] [ref=e104]:
              - strong [ref=e105]: What We Value
            - paragraph [ref=e106]:
              - text: In addition to
              - link "our core values" [ref=e107] [cursor=pointer]:
